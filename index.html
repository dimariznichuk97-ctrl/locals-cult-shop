  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ew Balance', name:'2002R Grey', cny:610, slot:'ph-nb2002r-main', sizes:[41,42,43,44,45], cat:'shoes', reviews:540 },\n    { id:'salxt6', brand:'Salomon', name:'XT-6 Phantom', cny:760, slot:'ph-salxt6-main', sizes:[40,41,42,43], cat:'shoes', tag:'New', reviews:320 },\n    { id:'techhoodie', brand:'Nike', name:'Tech Fleece худи', cny:420, slot:'ph-techhoodie-main', sizes:['S','M','L','XL'], cat:'apparel', reviews:210 },\n    { id:'arcbeta', brand:'Arcteryx', name:'Beta куртка Black', cny:1240, slot:'ph-arcbeta-main', sizes:['S','M','L','XL'], cat:'apparel', tag:'Хит', reviews:160 },\n    { id:'capne', brand:'New Era', name:'Кепка 9FORTY NY', cny:150, slot:'ph-capne-main', sizes:[], cat:'acc', reviews:90 },\n    { id:'socks3', brand:'Nike', name:'Носки Everyday (3 пары)', cny:85, slot:'ph-socks3-main', sizes:[], cat:'acc', reviews:430 },\n  ];\n  PARSE_IDS = ['dunk','nb2002r','salxt6','arcbeta'];\n  CATS = [ {k:'all',label:'Всё'}, {k:'shoes',label:'Обувь'}, {k:'apparel',label:'Одежда'}, {k:'acc',label:'Аксессуары'} ];\n  STEPS = [\n    { k:'ordered', label:'Заказ оформлен', sub:'Передан байеру в Китае' },\n    { k:'verified', label:'Выкуплен и проверен', sub:'Фото оригинала перед отправкой' },\n    { k:'shipped', label:'В пути', sub:'Доставка 12–18 дней' },\n    { k:'delivered', label:'Доставлен', sub:'Готов к выдаче' },\n  ];\n\n  money(v){ const n=Math.round(v); const s=n.toLocaleString('ru-RU'); return this.state.country==='BY' ? (s+' BYN') : (s+' ₽'); }\n  conv(cny){ const r=this.RATES[this.state.country]; const item=cny*r.rate; const commission=item*this.COMMISSION; const delivery=r.delivery; return { item, commission, delivery, total:item+commission+delivery }; }\n\n  go(screen){ this.setState({ prevScreen:this.state.screen, screen, justPlaced:false }); }\n  sizeLabelFor(it){ return it.cat==='apparel' ? 'Размер' : 'Размер (EU)'; }\n  sizeStr(it, sz){ if(sz==='OS'||sz==null) return 'One size'; return it.cat==='apparel' ? sz : 'EU '+sz; }\n\n  calcLink(){\n    if(this.state.calcLoading) return;\n    if(!this.state.linkVal.trim()) return;\n    this.setState({ calcLoading:true, calc:null, sizeSel:null, sizeErr:false, prevScreen:'home', screen:'link' });\n    clearTimeout(this._t3);\n    this._t3 = setTimeout(()=>{\n      const id = this.PARSE_IDS[this.state.calcIdx % this.PARSE_IDS.length];\n      const p = this.INSTOCK.find(x=>x.id===id);\n      this.setState({ calc:p, calcLoading:false, calcIdx:this.state.calcIdx+1 });\n    }, 950);\n  }\n\n  toConfirm(){\n    const p = this.state.calc; if(!p) return;\n    if(p.sizes.length>0 && !this.state.sizeSel){ this.setState({ sizeErr:true }); return; }\n    const size = p.sizes.length>0 ? this.state.sizeSel : 'OS';\n    const c = this.conv(p.cny);\n    this.setState({ pending:{ ...p, size, sizeStr:this.sizeStr(p,size), totalStr:this.money(c.total) }, prevScreen:'link', screen:'confirm' });\n  }\n  buyItem(){\n    const p = this.INSTOCK.find(x=>x.id===this.state.curId); if(!p) return;\n    if(p.sizes.length>0 && !this.state.sizeSel){ this.setState({ sizeErr:true }); return; }\n    const size = p.sizes.length>0 ? this.state.sizeSel : 'OS';\n    const c = this.conv(p.cny);\n    this.setState({ pending:{ ...p, size, sizeStr:this.sizeStr(p,size), totalStr:this.money(c.total) }, prevScreen:'item', screen:'confirm' });\n  }\n  openItem(id){ this.setState({ prevScreen:this.state.screen, screen:'item', curId:id, sizeSel:null, sizeErr:false }); }\n\n  placeOrder(){\n    const p = this.state.pending; if(!p) return;\n    const no = '#'+this.state.orderSeq;\n    const order = { no, brand:p.brand, name:p.name, size:p.sizeStr, cny:p.cny, slot:p.slot, statusKey:'ordered', date:'сегодня' };\n    this.setState({ orders:[order, ...this.state.orders], orderSeq:this.state.orderSeq+1, trackId:no, screen:'tracking', prevScreen:'orders', justPlaced:true, pending:null, calc:null, sizeSel:null, address:'', pay:'card' });\n  }\n  openTrack(no){ this.setState({ prevScreen:this.state.screen, screen:'tracking', trackId:no, justPlaced:false }); }\n\n  renderVals(){\n    const s = this.state;\n    const screen = s.screen;\n    const r = this.RATES[s.country];\n\n    const card = (p)=>{ const c=this.conv(p.cny); return { brand:p.brand, name:p.name, priceStr:this.money(c.total), ph:`${p.brand} · фото`, slot:p.slot, tag:p.tag||'', open:()=>this.openItem(p.id) }; };\n\n    // onboarding countries\n    const countries = [ {code:'BY',name:'Беларусь',cur:'BYN',k:'BY'}, {code:'RU',name:'Россия',cur:'₽',k:'RU'} ].map(c=>{ const sel=s.obCountry===c.k; return {\n      code:c.code, name:c.name, cur:c.cur, sel,\n      bg: sel?'rgba(33,215,103,.08)':'#161514', border: sel?'rgba(33,215,103,.5)':'rgba(255,255,255,.08)',\n      badgeBg: sel?'#21D767':'rgba(255,255,255,.08)', badgeColor: sel?'#0F0E0E':'#C9C8C3',\n      dotBorder: sel?'#21D767':'rgba(255,255,255,.2)', dotBg: sel?'#21D767':'transparent',\n      pick:()=>this.setState({ obCountry:c.k }) }; });\n\n    // recent + all orders\n    const statusMap = {\n      ordered:{ label:'Оформлен', color:'#E0A82E', bg:'rgba(224,168,46,.14)' },\n      verified:{ label:'Проверен', color:'#E0A82E', bg:'rgba(224,168,46,.14)' },\n      shipped:{ label:'В пути', color:'#5AA9FF', bg:'rgba(90,169,255,.14)' },\n      delivered:{ label:'Доставлен', color:'#21D767', bg:'rgba(33,215,103,.14)' },\n    };\n    const decorateOrder = (o)=>{ const c=this.conv(o.cny); const sm=statusMap[o.statusKey]; return {\n      no:o.no, brand:o.brand, name:o.name, sizeStr:o.size, date:o.date, slot:o.slot, total:this.money(c.total),\n      statusLabel:sm.label, statusColor:sm.color, statusBg:sm.bg, open:()=>this.openTrack(o.no) }; };\n    const allOrders = s.orders.map(decorateOrder);\n    const recentOrders = allOrders.slice(0,2);\n\n    // catalog\n    const catChips = this.CATS.map(c=>{ const active=(s.catFilter||'all')===c.k; return {\n      label:c.label, bg:active?'#21D767':'#161514', border:active?'#21D767':'rgba(255,255,255,.12)', color:active?'#0F0E0E':'#C9C8C3',\n      pick:()=>this.setState({ catFilter:c.k }) }; });\n    const catList = this.INSTOCK.filter(p=> (s.catFilter||'all')==='all' || p.cat===s.catFilter );\n\n    // current calc result chips\n    let calcVals = null;\n    if(s.calc){ const p=s.calc; const c=this.conv(p.cny);\n      const sizeChips = p.sizes.map(z=>{ const sel=s.sizeSel===z; return { label:String(z), bg:sel?'#21D767':'transparent', border:sel?'#21D767':'rgba(255,255,255,.16)', color:sel?'#0F0E0E':'#E5E4DF', pick:()=>this.setState({ sizeSel:z, sizeErr:false }) }; });\n      calcVals = { brand:p.brand, name:p.name, cny:p.cny, slot:p.slot, ph:`${p.brand} · фото`, reviews:p.reviews,\n        itemStr:this.money(c.item), deliveryStr:this.money(c.delivery), commissionStr:this.money(c.commission), totalStr:this.money(c.total),\n        hasSizes:p.sizes.length>0, sizeLabel:this.sizeLabelFor(p), sizeChips };\n    }\n\n    // in-stock item detail\n    let itemVals = null;\n    const it = this.INSTOCK.find(x=>x.id===s.curId);\n    if(it){ const c=this.conv(it.cny);\n      const sizeChips = it.sizes.map(z=>{ const sel=s.sizeSel===z; return { label:String(z), bg:sel?'#21D767':'transparent', border:sel?'#21D767':'rgba(255,255,255,.16)', color:sel?'#0F0E0E':'#E5E4DF', pick:()=>this.setState({ sizeSel:z, sizeErr:false }) }; });\n      itemVals = { brand:it.brand, name:it.name, slot:it.slot, ph:`${it.brand} · фото`, totalStr:this.money(c.total), reviews:it.reviews,\n        gallery:[ {slot:it.slot, ph:`${it.brand} · фото`}, {slot:it.slot+'-2', ph:`${it.brand} · фото 2`}, {slot:it.slot+'-3', ph:`${it.brand} · фото 3`} ],\n        hasSizes:it.sizes.length>0, sizeLabel:this.sizeLabelFor(it), sizeChips };\n    }\n\n    // payment methods\n    const pays = [ {k:'card',label:'Банковская карта'}, {k:'sbp',label:'СБП / перевод'}, {k:'crypto',label:'Криптовалюта (USDT)'} ].map(m=>{ const sel=s.pay===m.k; return {\n      label:m.label, sel, bg:sel?'rgba(33,215,103,.06)':'#161514', border:sel?'rgba(33,215,103,.45)':'rgba(255,255,255,.08)', dotBorder:sel?'#21D767':'rgba(255,255,255,.2)', pick:()=>this.setState({ pay:m.k }) }; });\n\n    // tracking\n    let trackVals = null;\n    const to = s.orders.find(o=>o.no===s.trackId) || s.orders[0];\n    if(to){ const c=this.conv(to.cny); const idx=this.STEPS.findIndex(x=>x.k===to.statusKey);\n      const steps = this.STEPS.map((st,i)=>({ label:st.label, sub:st.sub, done:i<idx, active:i===idx, notLast:i<3,\n        dotBg: i<idx?'#21D767':(i===idx?'rgba(33,215,103,.18)':'transparent'), dotBorder: i<=idx?'#21D767':'rgba(255,255,255,.16)',\n        titleColor: i<=idx?'#F4F4F2':'#6f6d68', lineColor: i<idx?'#21D767':'rgba(255,255,255,.12)',\n        showPhoto: i===1 && idx>=1 }));\n      trackVals = { no:to.no, brand:to.brand, name:to.name, date:to.date, slot:to.slot, sizeStr:to.size, total:this.money(c.total), proofSlot:to.slot+'-proof', steps };\n    }\n\n    // tabs\n    const tabDef = [ {k:'home',label:'Главная'},{k:'catalog',label:'Каталог'},{k:'orders',label:'Заказы'},{k:'profile',label:'Профиль'} ];\n    const tabScreen = (screen==='link'||screen==='item') ? 'home' : (screen==='tracking'||screen==='confirm' ? 'orders' : screen);\n    const activeTabIndex = Math.max(0, tabDef.findIndex(t=>t.k===tabScreen));\n    const tabs = tabDef.map(t=>{ const active=tabScreen===t.k; return { label:t.label, active, isHome:t.k==='home', isCatalog:t.k==='catalog', isOrders:t.k==='orders', isProfile:t.k==='profile', color:active?'#21D767':'#9b9a95', iconGlow:active?'drop-shadow(0 0 7px rgba(33,215,103,.85))':'none', badge: t.k==='orders' && s.orders.length ? '' : '', go:()=>this.go(t.k) }; });\n\n    const titles = { home:'LOCALS CULT', link:'Расчёт стоимости', item:it?it.brand:'Товар', catalog:'В наличии', confirm:'Оформление', tracking:'Отслеживание', orders:'Мои заказы', profile:'Профиль' };\n\n    return {\n      showSplash: s.splash!=='done',\n      splashOpacity: s.splash==='fade' ? 0 : 1,\n      splashPE: s.splash==='fade' ? 'none' : 'auto',\n      scrHome:screen==='home', scrLink:screen==='link', scrItem:screen==='item', scrCatalog:screen==='catalog',\n      scrConfirm:screen==='confirm', scrTracking:screen==='tracking', scrOrders:screen==='orders', scrProfile:screen==='profile',\n      showTabbar: ['home','catalog','orders','profile'].includes(screen),\n      showBack: ['link','item','confirm','tracking'].includes(screen),\n      headerTitle: titles[screen] || 'PARSEL',\n      goBack: ()=>this.go(s.prevScreen||'home'),\n      countryCode: s.country, curSym: r.sym, countryName: r.name,\n      toggleCountry: ()=>this.setState({ country: s.country==='BY'?'RU':'BY' }),\n\n      // home\n      modeIndicator: s.mode==='order' ? 'translateX(0)' : 'translateX(100%)',\n      orderModeColor: s.mode==='order' ? '#21D767' : '#9b9a95',\n      stockModeColor: s.mode==='instock' ? '#21D767' : '#9b9a95',\n      orderModeGlow: s.mode==='order' ? 'drop-shadow(0 0 7px rgba(33,215,103,.85))' : 'none',\n      stockModeGlow: s.mode==='instock' ? 'drop-shadow(0 0 7px rgba(33,215,103,.85))' : 'none',\n      isOrderMode: s.mode==='order', isStockMode: s.mode==='instock',\n      setOrderMode: ()=>this.setState({ mode:'order' }), setStockMode: ()=>this.setState({ mode:'instock' }),\n      goLink: ()=>this.go('link'),\n      goCatalog: ()=>setTimeout(()=>this.go('catalog'),190),\n      goOrders: ()=>setTimeout(()=>this.go('orders'),190),\n      steps3: [ {n:'01',t:'Вставьте ссылку с Poizon'}, {n:'02',t:'Узнайте цену под ключ'}, {n:'03',t:'Оплатите — мы выкупим'} ],\n      featured: this.INSTOCK.slice(0,4).map(card),\n      recentOrders,\n\n      // link\n      linkVal:s.linkVal, hasLink: !!s.linkVal,\n      onLink:(e)=>this.setState({ linkVal:e.target.value }),\n      onLinkFocus:()=>this.setState({ linkFocused:true }), onLinkBlur:()=>this.setState({ linkFocused:false }),\n      clearLink:()=>this.setState({ linkVal:'' }),\n      linkBorder: s.linkFocused ? 'rgba(33,215,103,.7)' : 'rgba(255,255,255,.14)',\n      linkGlow: s.linkFocused ? '0 0 0 3px rgba(33,215,103,.14), inset 0 1px 0 rgba(255,255,255,.18)' : 'inset 0 1px 0 rgba(255,255,255,.18)',\n      linkIconColor: s.linkFocused ? '#21D767' : '#6f6d68',\n      calcLink:()=>this.calcLink(), calcLoading:s.calcLoading, calcBtnLabel: s.calcLoading ? 'Считаем…' : 'Рассчитать',\n      hasCalc: !!s.calc && !s.calcLoading, calc:calcVals, sizeErr:s.sizeErr, toConfirm:()=>this.toConfirm(),\n      scrLinkBar: screen==='link' && !!s.calc && !s.calcLoading,\n\n      // item\n      item:itemVals, buyItem:()=>this.buyItem(),\n      favBg: (it && s.favs.includes(it.id)) ? 'rgba(33,215,103,.14)' : 'rgba(255,255,255,.06)',\n      favStroke: (it && s.favs.includes(it.id)) ? '#21D767' : '#C9C8C3',\n      favFill: (it && s.favs.includes(it.id)) ? '#21D767' : 'none',\n      favGlow: (it && s.favs.includes(it.id)) ? 'drop-shadow(0 0 7px rgba(33,215,103,.7))' : 'none',\n      toggleFav: ()=>{ if(!it) return; const f=s.favs.slice(); const i=f.indexOf(it.id); if(i>=0) f.splice(i,1); else f.push(it.id); this.setState({ favs:f }); },\n\n      // catalog\n      catChips, catalogProducts: catList.map(card),\n      catCountLabel: `${catList.length} ${catList.length===1?'товар':(catList.length>=2&&catList.length<=4?'товара':'товаров')}`,\n\n      // confirm\n      pending: s.pending || { brand:'', name:'', slot:'', sizeStr:'', totalStr:'' },\n      address:s.address, onAddress:(e)=>this.setState({ address:e.target.value }),\n      payMethods:pays, placeOrder:()=>this.placeOrder(),\n\n      // tracking\n      track: trackVals || { no:'', brand:'', name:'', date:'', slot:'', sizeStr:'', total:'', proofSlot:'', steps:[] },\n      justPlaced:s.justPlaced, contactUs:()=>window.open('https://t.me/Locals_cu_bot','_blank'),\n\n      // orders\n      allOrders,\n\n      // profile\n      userName:'Дмитрий', userHandle:'@dmitry', ordersCount:s.orders.length,\n\n      // tabs\n      tabs, tabIndicatorTransform: 'translateX(calc(100% * '+activeTabIndex+'))',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
